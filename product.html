<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Product</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-tr from-purple-300 via-pink-300 to-yellow-300 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-3xl p-10 w-full max-w-2xl">
    <h1 class="text-4xl font-extrabold text-center text-purple-700 mb-10 tracking-wide drop-shadow-md">
      🛍️ Add New Product
    </h1>

    <form id="productForm" class="flex flex-col gap-6">
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Product Name</label>
        <input type="text" id="productName" required
          class="w-full px-6 py-3 border border-gray-300 rounded-3xl shadow-sm
                 focus:outline-none focus:ring-4 focus:ring-purple-400 transition" />
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Category</label>
        <input type="text" id="category" required
          class="w-full px-6 py-3 border border-gray-300 rounded-3xl shadow-sm
                 focus:outline-none focus:ring-4 focus:ring-purple-400 transition" />
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Company Name</label>
        <input type="text" id="companyName" required
          class="w-full px-6 py-3 border border-gray-300 rounded-3xl shadow-sm
                 focus:outline-none focus:ring-4 focus:ring-purple-400 transition" />
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Quantity</label>
        <input type="number" id="quantity" required min="0" step="1"
          class="w-full px-6 py-3 border border-gray-300 rounded-3xl shadow-sm
                 focus:outline-none focus:ring-4 focus:ring-purple-400 transition" />
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Price ($)</label>
        <input type="number" id="price" required min="0" step="0.01"
          class="w-full px-6 py-3 border border-gray-300 rounded-3xl shadow-sm
                 focus:outline-none focus:ring-4 focus:ring-purple-400 transition" />
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-4 rounded-3xl
               shadow-lg hover:from-pink-600 hover:to-purple-700 transition duration-300">
        ➕ Add Product
      </button>
    </form>

    <div class="mt-12 flex flex-col sm:flex-row justify-center gap-8">
      <a href="product-records.html"
         class="flex items-center justify-center gap-3 bg-gradient-to-r from-indigo-600 to-purple-700
                text-white font-semibold py-3 px-10 rounded-3xl shadow-xl
                hover:from-purple-700 hover:to-indigo-800 transition duration-300">
        📋 View Product Records
      </a>
      <a href="dashboard.html"
         class="flex items-center justify-center gap-3 bg-gradient-to-r from-green-500 to-teal-600
                text-white font-semibold py-3 px-10 rounded-3xl shadow-xl
                hover:from-teal-600 hover:to-green-700 transition duration-300">
        🏠 Go to Dashboard
      </a>
    </div>
  </div>

  <script>
    const productForm = document.getElementById('productForm');

    productForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const productName = document.getElementById('productName').value.trim();
      const category = document.getElementById('category').value.trim();
      const companyName = document.getElementById('companyName').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      const quantity = parseInt(document.getElementById('quantity').value, 10);

      if (!productName || !category || !companyName || isNaN(price) || isNaN(quantity)) {
        alert('Please fill in all fields correctly.');
        return;
      }

      const newProduct = {
        productId: "PROD" + Date.now(), // unique ID for tracking
        productName,
        category,
        companyName,
        price,
        quantity
      };

      const products = JSON.parse(localStorage.getItem('products') || '[]');
      products.push(newProduct);
      localStorage.setItem('products', JSON.stringify(products));

      alert('✅ Product added successfully!');
      productForm.reset();
    });
  </script>

</body>
</html>
