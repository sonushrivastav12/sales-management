<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Entry</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #e0ffe9, #f0fff5);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 720px;
      margin: 50px auto;
      background: #ffffff;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 30px;
      position: relative;
    }
    h2::before {
      content: "🧾 ";
      margin-right: 8px;
      font-size: 30px;
    }
    label {
      display: block;
      margin: 18px 0 6px;
      color: #34495e;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
      transition: all 0.2s ease-in-out;
    }
    input:focus {
      border-color: #28a745;
      outline: none;
      box-shadow: 0 0 5px rgba(40, 167, 69, 0.2);
    }
    .btn-group {
      margin-top: 28px;
      text-align: center;
    }
    .btn {
      padding: 20px 90px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }
    .btn:hover {
      background-color: #1e7e34;
      transform: translateY(-2px);
    }
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-top: 35px;
    }
    .nav-btn {
      padding: 14px 80px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      text-decoration: none;
      text-align: center;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .nav-btn:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }
    .dashboard-btn {
      background-color: #17a2b8;
    }
    .dashboard-btn:hover {
      background-color: #117a8b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Sales Entry</h2>
    <form id="salesForm">

      <label for="invoiceNumber">Invoice Number</label>
      <input type="text" id="invoiceNumber" placeholder="Enter invoice number" required />

      <label for="customerName">Customer Name</label>
      <input type="text" id="customerName" placeholder="Enter customer name" required />

      <label for="productName">Product Name</label>
      <input type="text" id="productName" placeholder="Enter product name" required />

      <label for="brand">Brand</label>
      <input type="text" id="brand" placeholder="Enter brand" required />

      <label for="quantity">Quantity</label>
      <input type="number" id="quantity" placeholder="Enter quantity sold" required min="1" />

      <label for="amount">Amount</label>
      <input type="number" id="amount" placeholder="Enter total amount" required min="0" step="0.01" />

      <label for="salesDate">Sales Date</label>
      <input type="date" id="salesDate" required />

      <div class="btn-group">
        <button type="submit" class="btn">Submit</button>
      </div>
    </form>

    <div class="nav-buttons">
      <a href="sales-record.html" class="nav-btn">📄 View Records</a>
      <a href="dashboard.html" class="nav-btn dashboard-btn">🏠 Go to Dashboard</a>
    </div>
  </div>

  <script>
    document.getElementById("salesForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const salesData = {
        invoiceNumber: document.getElementById("invoiceNumber").value,
        customerName: document.getElementById("customerName").value,
        productName: document.getElementById("productName").value,
        brand: document.getElementById("brand").value,
        quantity: document.getElementById("quantity").value,
        amount: document.getElementById("amount").value,
        salesDate: document.getElementById("salesDate").value
      };

      let sales = JSON.parse(localStorage.getItem("sales")) || [];
      sales.push(salesData);
      localStorage.setItem("sales", JSON.stringify(sales));

      alert("✅ Sale recorded successfully!");
      document.getElementById("salesForm").reset();
    });
  </script>
</body>
</html>
