<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supplier Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Subtle hover shadow and brightness */
    .btn-subtle-hover:hover {
      filter: brightness(0.95);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s ease, filter 0.25s ease, box-shadow 0.25s ease;
    }

    /* Scale effect on tap (click) */
    .btn-subtle-hover:active {
      transform: scale(0.97);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-200 to-purple-300 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-3xl p-10 w-full max-w-2xl">
    <h1 class="text-4xl font-extrabold text-center text-indigo-700 mb-8">🔧 Add New Supplier</h1>

    <form id="supplierForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Supplier Name</label>
        <input type="text" id="name" class="w-full rounded-xl border border-gray-300 p-3 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none" required />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Company</label>
        <input type="text" id="company" class="w-full rounded-xl border border-gray-300 p-3 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none" required />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" id="email" class="w-full rounded-xl border border-gray-300 p-3 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none" required />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
        <input type="tel" id="phone" class="w-full rounded-xl border border-gray-300 p-3 shadow-sm focus:ring-2 focus:ring-indigo-400 outline-none" required />
      </div>

      <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl text-lg font-semibold shadow-md btn-subtle-hover">
        💾 Save Supplier
      </button>
    </form>

    <!-- Buttons Section -->
    <div class="mt-10 grid grid-cols-1 sm:grid-cols-2 gap-4 text-center">
      <a href="supplier-records.html" class="bg-purple-600 text-white py-3 rounded-xl font-medium shadow-md btn-subtle-hover">
        📄 View Records
      </a>
      <a href="dashboard.html" class="bg-green-600 text-white py-3 rounded-xl font-medium shadow-md btn-subtle-hover">
        🏠 Go to Dashboard
      </a>
    </div>
  </div>

  <script>
    document.getElementById("supplierForm").addEventListener("submit", function (e) {
      e.preventDefault();
      
      const supplier = {
        name: document.getElementById("name").value.trim(),
        company: document.getElementById("company").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim()
      };

      const suppliers = JSON.parse(localStorage.getItem("suppliers") || "[]");
      suppliers.push(supplier);
      localStorage.setItem("suppliers", JSON.stringify(suppliers));

      alert("✅ Supplier saved!");
      this.reset();
    });
  </script>

</body>
</html>
