<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Purchase Return Entry</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #c2e9fb, #a1c4fd);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: white;
      padding: 40px 50px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
      max-width: 800px;
      width: 100%;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.01);
    }

    .card h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c3e50;
      font-size: 30px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    form label {
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
      color: #34495e;
    }

    form input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 15px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    form input:focus {
      border-color: #3498db;
      outline: none;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
    }

    button {
      padding: 15px;
      background-color: #28a745;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      font-size: 17px;
    }

    button:hover {
      background-color: #218838;
      transform: scale(1.02);
    }

    .success-message {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background-color: #d4edda;
      color: #155724;
      border-left: 5px solid #28a745;
      border-radius: 8px;
      font-size: 16px;
      animation: slideIn 0.4s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .button-row {
      margin-top: 30px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .button-row a {
      flex: 1 1 48%;
      text-align: center;
      padding: 12px 0;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: background-color 0.3s ease;
      font-size: 16px;
    }

    .button-row a:hover {
      background-color: #0056b3;
    }

    @media (max-width: 600px) {
      .card {
        padding: 30px 20px;
      }

      .button-row {
        flex-direction: column;
      }

      .button-row a {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>

  <div class="card" role="main" aria-label="Purchase return entry form">
    <h1>↩️ Purchase Return</h1>
    <form id="returnForm" novalidate>
      <div>
        <label for="invoiceNo">Invoice No</label>
        <input type="text" id="invoiceNo" placeholder="Enter invoice number" required autocomplete="off" />
      </div>

      <div>
        <label for="supplierName">Supplier Name</label>
        <input type="text" id="supplierName" placeholder="Enter supplier name" required autocomplete="off" />
      </div>

      <div>
        <label for="productName">Product Name</label>
        <input type="text" id="productName" placeholder="Enter product name" required autocomplete="off" />
      </div>

      <div>
        <label for="brandName">Brand Name</label>
        <input type="text" id="brandName" placeholder="Enter brand" required autocomplete="off" />
      </div>

      <div>
        <label for="quantity">Return Quantity</label>
        <input type="number" id="quantity" placeholder="Enter return quantity" min="1" required />
      </div>

      <div>
        <label for="cost">Cost per Unit ($)</label>
        <input type="number" id="cost" placeholder="Enter cost" min="0.01" step="0.01" required />
      </div>

      <div>
        <label for="date">Date of Return</label>
        <input type="date" id="date" required />
      </div>

      <div>
        <label for="reason">Return Reason</label>
        <input type="text" id="reason" placeholder="Enter reason for return" required autocomplete="off" />
      </div>

      <button type="submit" aria-label="Submit return entry">Submit Return</button>
    </form>

    <div class="success-message" id="successMsg" role="alert" aria-live="polite">
      ✅ Purchase return entry saved successfully!
    </div>

    <div class="button-row">
      <a href="purchase return-record.html" aria-label="Go to purchase return record page">📄 View Return Records</a>
      <a href="dashboard.html" aria-label="Go to dashboard">🏠 Go to Dashboard</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('returnForm');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      const invoiceNo = form.invoiceNo.value.trim();
      const supplierName = form.supplierName.value.trim();
      const productName = form.productName.value.trim();
      const brandName = form.brandName.value.trim();
      const quantity = Number(form.quantity.value);
      const cost = Number(form.cost.value);
      const date = form.date.value;
      const reason = form.reason.value.trim();

      if (!invoiceNo || !supplierName || !productName || !brandName || quantity < 1 || cost <= 0 || !date || !reason) {
        alert('❗ Please fill in all fields with valid values.');
        return;
      }

      const returnEntry = {
        invoiceNo,
        supplierName,
        productName,
        brandName,
        quantity,
        cost,
        date,
        reason,
        timestamp: new Date().toISOString()
      };

      const existing = JSON.parse(localStorage.getItem('purchaseReturnEntries') || '[]');
      existing.push(returnEntry);
      localStorage.setItem('purchaseReturnEntries', JSON.stringify(existing));

      successMsg.style.display = 'block';
      form.reset();

      setTimeout(() => {
        successMsg.style.display = 'none';
      }, 3000);
    });
  </script>

</body>
</html>
