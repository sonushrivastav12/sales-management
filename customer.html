<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customer Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-200 to-blue-300 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-3xl p-10 w-full max-w-2xl">
    <h1 class="text-4xl font-extrabold text-center text-green-700 mb-8">👤 Add New Customer</h1>

    <form id="customerForm" class="flex flex-col gap-6">
      <div>
        <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
        <input type="text" id="name" required
          class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-4 focus:ring-green-400 transition" />
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Email</label>
        <input type="email" id="email" required
          class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-4 focus:ring-green-400 transition" />
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Phone</label>
        <input type="tel" id="phone" required
          class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-4 focus:ring-green-400 transition" />
      </div>

      <div>
        <label class="block text-gray-700 font-semibold mb-2">Address</label>
        <input type="text" id="address" required
          class="w-full px-5 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-4 focus:ring-green-400 transition" />
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-green-500 to-teal-500 text-white font-semibold py-4 rounded-3xl shadow-lg hover:from-green-600 hover:to-teal-600 transition duration-300">
        ➕ Add Customer
      </button>
    </form>

    <!-- Buttons container with unique styling -->
    <div class="mt-12 flex flex-col sm:flex-row justify-center gap-6">
      <a href="customer-records.html"
        class="flex items-center justify-center gap-3 bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-semibold py-3 px-8 rounded-3xl shadow-xl hover:from-purple-600 hover:to-indigo-700 transition duration-300">
        📋 View Customer Records
      </a>
      <a href="dashboard.html"
        class="flex items-center justify-center gap-3 bg-gradient-to-r from-green-500 to-blue-600 text-white font-semibold py-3 px-8 rounded-3xl shadow-xl hover:from-green-600 hover:to-blue-700 transition duration-300">
        🏠 Go to Dashboard
      </a>
    </div>
  </div>

  <script>
    const customerForm = document.getElementById("customerForm");

    customerForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const address = document.getElementById("address").value.trim();

      const newCustomer = { name, email, phone, address };

      const customers = JSON.parse(localStorage.getItem("customers") || "[]");
      customers.push(newCustomer);
      localStorage.setItem("customers", JSON.stringify(customers));

      alert("✅ Customer added successfully!");
      customerForm.reset();
    });
  </script>

</body>
</html>
