<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Transaction Records</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f9f9f9;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .back-button {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .back-button button {
      padding: 8px 16px;
      background: #555;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .filter {
      max-width: 600px;
      margin: auto;
      margin-bottom: 15px;
    }

    select {
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      max-width: 1000px;
      margin: auto;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px #ccc;
      font-size: 14px;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #ddd;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      background: #4CAF50;
      color: white;
      text-align: center;
    }

    td:nth-child(1),
    td:nth-child(2),
    td:nth-child(3),
    td:nth-child(6),
    td:nth-child(7),
    td:nth-child(8),
    td:nth-child(9) {
      text-align: center;
    }

    td:nth-child(4),
    td:nth-child(5) {
      text-align: left;
      max-width: 150px;
      white-space: normal;
      word-wrap: break-word;
    }

    td button {
      margin: 2px 3px;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
    }

    .btn-delete {
      background: #e74c3c;
    }

    .btn-edit {
      background: #3498db;
    }

    .btn-pdf {
      background: #27ae60;
    }

    .no-data {
      text-align: center;
      margin-top: 40px;
      color: #777;
      font-size: 18px;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0; top: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      max-width: 90%;
    }

    .modal-content label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    .modal-content input,
    .modal-content select,
    .modal-content textarea {
      width: 100%;
      padding: 6px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .modal-buttons {
      margin-top: 15px;
      text-align: right;
    }

    .modal-buttons button {
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <h2>Transaction Records</h2>

  <div class="back-button">
    <a href="sales both.html">
    <button onclick="goBack()">← Back</button></a>
  </div>

  <div class="filter">
    <label for="filterType">Filter by Type:</label>
    <select id="filterType">
      <option value="All">All</option>
      <option value="Sale">Sale</option>
      <option value="Return">Return</option>
    </select>
  </div>

  <table id="transactionsTable">
    <thead>
      <tr>
        <th>Type</th>
        <th>Invoice No.</th>
        <th>Date</th>
        <th>Customer</th>
        <th>Product</th>
        <th>Qty</th>
        <th>Unit Price</th>
        <th>Total</th>
        <th>Payment</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="no-data" id="noDataMsg" style="display:none;">No transactions found.</div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h3>Edit Transaction</h3>
      <form id="editForm">
        <input type="hidden" id="editIndex" />
        <label>Type</label>
        <select id="editType" required>
          <option value="Sale">Sale</option>
          <option value="Return">Return</option>
        </select>
        <label>Invoice Number</label>
        <input type="text" id="editInvoice" required />
        <label>Date</label>
        <input type="date" id="editDate" required />
        <label>Customer Name</label>
        <input type="text" id="editCustomer" required />
        <label>Product Name</label>
        <input type="text" id="editProduct" required />
        <label>Quantity</label>
        <input type="number" id="editQuantity" required min="1" />
        <label>Unit Price</label>
        <input type="number" id="editPrice" required min="0" step="0.01" />
        <label>Payment Method</label>
        <select id="editPayment" required>
          <option value="Cash">Cash</option>
          <option value="Card">Card</option>
          <option value="UPI">UPI</option>
          <option value="Credit">Credit</option>
        </select>
        <div id="editReturnFields" style="display:none;">
          <label>Return Reason</label>
          <textarea id="editReason"></textarea>
          <label>Refund Method</label>
          <select id="editRefund">
            <option value="">-- Select Refund --</option>
            <option value="Cash">Cash</option>
            <option value="Bank Transfer">Bank Transfer</option>
            <option value="Credit Note">Credit Note</option>
          </select>
        </div>
        <div class="modal-buttons">
          <button type="button" id="cancelEdit">Cancel</button>
          <button type="submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function goBack() {
      window.history.back(); // Or use: window.location.href = 'dashboard.html';
    }

    const transactionsTableBody = document.querySelector("#transactionsTable tbody");
    const noDataMsg = document.getElementById("noDataMsg");
    const filterType = document.getElementById("filterType");

    let transactions = JSON.parse(localStorage.getItem("transactionsData")) || [];

    function renderTable(filter = "All") {
      transactionsTableBody.innerHTML = "";
      let filtered = filter === "All" ? transactions : transactions.filter(t => t.type === filter);
      if (filtered.length === 0) {
        noDataMsg.style.display = "block";
        document.getElementById("transactionsTable").style.display = "none";
        return;
      } else {
        noDataMsg.style.display = "none";
        document.getElementById("transactionsTable").style.display = "table";
      }

      filtered.forEach((t, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${t.type}</td>
          <td>${t.invoice}</td>
          <td>${t.date}</td>
          <td>${t.customer}</td>
          <td>${t.product}</td>
          <td>${t.quantity}</td>
          <td>${t.price.toFixed(2)}</td>
          <td>${(t.quantity * t.price).toFixed(2)}</td>
          <td>${t.payment}</td>
          <td style="white-space: nowrap;">
            <button class="btn-edit" data-index="${index}">Edit</button>
            <button class="btn-delete" data-index="${index}">Delete</button>
            ${t.type === "Sale" ? `<button class="btn-pdf" data-index="${index}">View PDF</button>` : ""}
          </td>`;
        transactionsTableBody.appendChild(tr);
      });
    }

    filterType.addEventListener("change", () => renderTable(filterType.value));

    transactionsTableBody.addEventListener("click", e => {
      if (e.target.classList.contains("btn-delete")) {
        const index = +e.target.dataset.index;
        if (confirm("Are you sure you want to delete this transaction?")) {
          transactions.splice(index, 1);
          localStorage.setItem("transactionsData", JSON.stringify(transactions));
          renderTable(filterType.value);
        }
      } else if (e.target.classList.contains("btn-edit")) {
        const index = +e.target.dataset.index;
        openEditModal(index);
      } else if (e.target.classList.contains("btn-pdf")) {
        const index = +e.target.dataset.index;
        generatePDF(transactions[index]);
      }
    });

    const editModal = document.getElementById("editModal");
    const editForm = document.getElementById("editForm");
    const editReturnFields = document.getElementById("editReturnFields");
    const editType = document.getElementById("editType");

    function openEditModal(index) {
      const t = transactions[index];
      document.getElementById("editIndex").value = index;
      document.getElementById("editInvoice").value = t.invoice;
      document.getElementById("editDate").value = t.date;
      document.getElementById("editCustomer").value = t.customer;
      document.getElementById("editProduct").value = t.product;
      document.getElementById("editQuantity").value = t.quantity;
      document.getElementById("editPrice").value = t.price;
      document.getElementById("editPayment").value = t.payment;
      document.getElementById("editReason").value = t.reason || "";
      document.getElementById("editRefund").value = t.refund || "";
      editType.value = t.type;
      toggleReturnFields(t.type);
      editModal.style.display = "flex";
    }

    function toggleReturnFields(type) {
      editReturnFields.style.display = type === "Return" ? "block" : "none";
    }

    editType.addEventListener("change", () => toggleReturnFields(editType.value));
    document.getElementById("cancelEdit").addEventListener("click", () => editModal.style.display = "none");

    editForm.addEventListener("submit", e => {
      e.preventDefault();
      const index = +document.getElementById("editIndex").value;
      transactions[index] = {
        type: editType.value,
        invoice: document.getElementById("editInvoice").value,
        date: document.getElementById("editDate").value,
        customer: document.getElementById("editCustomer").value,
        product: document.getElementById("editProduct").value,
        quantity: +document.getElementById("editQuantity").value,
        price: +document.getElementById("editPrice").value,
        payment: document.getElementById("editPayment").value,
        reason: document.getElementById("editReason").value,
        refund: document.getElementById("editRefund").value
      };
      localStorage.setItem("transactionsData", JSON.stringify(transactions));
      renderTable(filterType.value);
      editModal.style.display = "none";
      alert("Transaction updated!");
    });

    window.addEventListener("click", e => {
      if (e.target === editModal) {
        editModal.style.display = "none";
      }
    });

    function generatePDF(t) {
      if (typeof window.jspdf === "undefined") {
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
        script.onload = () => createPDF(t);
        document.body.appendChild(script);
      } else {
        createPDF(t);
      }
    }

    function createPDF(t) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(18);
      doc.text("Invoice", 105, 20, null, null, "center");
      doc.setFontSize(12);
      doc.text(`Invoice No: ${t.invoice}`, 20, 40);
      doc.text(`Date: ${t.date}`, 150, 40);
      doc.text(`Customer: ${t.customer}`, 20, 50);
      doc.text(`Payment Method: ${t.payment}`, 150, 50);
      doc.line(20, 55, 190, 55);
      doc.text("Product Details", 20, 65);
      doc.text("Name", 20, 75);
      doc.text("Qty", 90, 75);
      doc.text("Unit Price", 120, 75);
      doc.text("Total", 170, 75);
      doc.text(t.product, 20, 85);
      doc.text(String(t.quantity), 90, 85);
      doc.text(t.price.toFixed(2), 120, 85);
      doc.text((t.quantity * t.price).toFixed(2), 170, 85);
      doc.line(20, 90, 190, 90);
      doc.text(`Total Amount: ₹${(t.quantity * t.price).toFixed(2)}`, 20, 100);
      doc.save(`Invoice_${t.invoice}.pdf`);
    }

    // Initial render
    renderTable();
  </script>
</body>
</html>
