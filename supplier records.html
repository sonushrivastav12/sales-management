<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Supplier Records</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0fdf4;
      margin: 0;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      font-size: 2rem;
    }

    .table-container {
      max-width: 1100px;
      width: 95%;
      margin: 2rem auto;
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
    }

    th, td {
      padding: 1rem;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }

    th {
      background-color: #d1fae5;
      color: #065f46;
      font-weight: 600;
    }

    tr:hover {
      background-color: #f0fdf4;
    }

    button.action-btn {
      padding: 6px 10px;
      font-size: 0.9rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin-right: 8px;
    }

    button.update-btn {
      background-color: #4caf50;
      color: white;
    }

    button.update-btn:hover {
      background-color: #3a8c40;
    }

    button.delete-btn {
      background-color: #e74c3c;
      color: white;
    }

    button.delete-btn:hover {
      background-color: #b92d23;
    }

    .back-button {
      display: block;
      width: fit-content;
      margin: 1.5rem auto 0;
      padding: 0.75rem 1.5rem;
      background-color: #3b82f6;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.3s ease;
    }

    .back-button:hover {
      background-color: #1d4ed8;
    }

    .no-data {
      text-align: center;
      color: #6b7280;
      font-weight: 500;
      font-size: 1.1rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

  <h1>📦 Supplier Records</h1>

  <div class="table-container">
    <table id="supplierRecordsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Company</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="recordsBody">
        <!-- Supplier rows will appear here -->
      </tbody>
    </table>
    <div class="no-data" id="noDataMessage" style="display:none;">No supplier records found.</div>
  </div>

  <a class="back-button" href="Supplier.html">🔙 Back to Supplier Entry</a>

  <script>
    const recordsBody = document.getElementById('recordsBody');
    const noDataMessage = document.getElementById('noDataMessage');

    function loadSuppliers() {
      let suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
      recordsBody.innerHTML = '';

      if (suppliers.length === 0) {
        noDataMessage.style.display = 'block';
        return;
      } else {
        noDataMessage.style.display = 'none';
      }

      suppliers.forEach(supplier => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${supplier.id}</td>
          <td>${supplier.name}</td>
          <td>${supplier.company}</td>
          <td>${supplier.email}</td>
          <td>${supplier.phone}</td>
          <td>
            <button class="action-btn update-btn" onclick="editSupplier(${supplier.id})">✏️ Update</button>
            <button class="action-btn delete-btn" onclick="deleteSupplier(${supplier.id})">🗑️ Delete</button>
          </td>
        `;

        recordsBody.appendChild(tr);
      });
    }

    function editSupplier(id) {
      const numericId = Number(id);
      // Redirect to Supplier.html with ?editId=numericId
      window.location.href = `Supplier.html?editId=${numericId}`;
    }

    function deleteSupplier(id) {
      const numericId = Number(id);
      if (confirm('Are you sure you want to delete this supplier?')) {
        let suppliers = JSON.parse(localStorage.getItem('suppliers') || '[]');
        suppliers = suppliers.filter(s => s.id !== numericId);
        localStorage.setItem('suppliers', JSON.stringify(suppliers));
        alert('Supplier deleted successfully.');
        loadSuppliers();
      }
    }

    // Load suppliers on page load
    window.onload = loadSuppliers;
  </script>

</body>
</html>
