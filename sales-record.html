<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Records</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f9f9ff, #e8f0ff);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 1200px;
      margin: 50px auto;
      background: #fff;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }
    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 25px;
      font-size: 32px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 14px;
      text-align: center;
      border: 1px solid #ccc;
    }
    th {
      background-color: #007bff;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f4f8ff;
    }

    .btn {
      padding: 8px 14px;
      margin: 4px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .btn i {
      font-size: 14px;
    }
    .btn-update {
      background-color: #ffc107;
      color: black;
    }
    .btn-delete {
      background-color: #dc3545;
      color: white;
    }
    .btn-view {
      background-color: #28a745;
      color: white;
    }
    .btn-cancel {
      background-color: #6c757d;
      color: white;
    }
    .btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      filter: brightness(1.1);
    }

    .nav {
      text-align: center;
      margin-top: 30px;
    }
    .nav a {
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      padding: 14px 40px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
      margin: 0 10px;
      display: inline-block;
      transition: all 0.4s ease;
      box-shadow: 0 4px 8px rgba(0, 123, 255, 0.2);
      position: relative;
      overflow: hidden;
    }
    .nav a::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.2);
      transform: skewX(-20deg);
      transition: left 0.5s ease;
      z-index: 0;
    }
    .nav a:hover::before {
      left: 120%;
    }
    .nav a:hover {
      background: linear-gradient(135deg, #0056b3, #003e80);
      box-shadow: 0 10px 20px rgba(0, 86, 179, 0.4);
      transform: translateY(-3px) scale(1.03);
      color: #fff;
    }

    input.editable {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Sales Records 📄</h2>
    <table id="salesTable">
      <thead>
        <tr>
          <th>ID No.</th>
          <th>Invoice Number</th>
          <th>Customer</th>
          <th>Product</th>
          <th>Brand</th>
          <th>Qty</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="nav">
      <a href="sales.html"><i class="fas fa-arrow-left"></i>Back to Sales Entry</a>
      <a href="sales return.html"><i class="fas fa-undo-alt"></i>Sales Return</a>
      <a href="dashboard.html"><i class="fas fa-home"></i>Go to Dashboard</a>
    </div>
  </div>

  <!-- jsPDF library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const tableBody = document.querySelector("#salesTable tbody");

    function loadSales() {
      tableBody.innerHTML = "";
      const sales = JSON.parse(localStorage.getItem("sales")) || [];

      sales.forEach((sale, index) => {
        const row = document.createElement("tr");
        row.setAttribute("data-index", index);

        row.innerHTML = `
          <td>${index + 1}</td>
          <td><span>${sale.invoiceNumber}</span></td>
          <td><span>${sale.customerName}</span></td>
          <td><span>${sale.productName}</span></td>
          <td><span>${sale.brand}</span></td>
          <td><span>${sale.quantity}</span></td>
          <td><span>${sale.amount}</span></td>
          <td><span>${sale.salesDate}</span></td>
          <td class="actions">
            <button class="btn btn-view" onclick="viewInvoice(${index})"><i class="fas fa-eye"></i> View</button>
            <button class="btn btn-update" onclick="editSale(this, ${index})"><i class="fas fa-pen"></i> Update</button>
            <button class="btn btn-delete" onclick="deleteSale(${index})"><i class="fas fa-trash-alt"></i> Delete</button>
          </td>
        `;

        tableBody.appendChild(row);
      });
    }

    function deleteSale(index) {
      if (confirm("Are you sure you want to delete this record?")) {
        const sales = JSON.parse(localStorage.getItem("sales")) || [];
        sales.splice(index, 1);
        localStorage.setItem("sales", JSON.stringify(sales));
        loadSales();
      }
    }

    async function viewInvoice(index) {
      const sales = JSON.parse(localStorage.getItem("sales")) || [];
      const sale = sales[index];

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.setFontSize(20);
      doc.text("Sales Invoice", 80, 20);

      doc.setFontSize(12);
      doc.text(`Invoice Number: ${sale.invoiceNumber}`, 20, 40);
      doc.text(`Customer Name: ${sale.customerName}`, 20, 50);
      doc.text(`Product Name: ${sale.productName}`, 20, 60);
      doc.text(`Brand: ${sale.brand}`, 20, 70);
      doc.text(`Quantity: ${sale.quantity}`, 20, 80);
      doc.text(`Amount: ₹${sale.amount}`, 20, 90);
      doc.text(`Sales Date: ${sale.salesDate}`, 20, 100);

      const pdfBlob = doc.output("blob");
      const pdfUrl = URL.createObjectURL(pdfBlob);
      window.open(pdfUrl, "_blank");
    }

    function editSale(btn, index) {
      const row = btn.closest("tr");
      const cells = row.querySelectorAll("td:not(:first-child):not(:last-child)");

      if (btn.textContent.includes("Save")) {
        const sales = JSON.parse(localStorage.getItem("sales")) || [];

        const updatedSale = {
          invoiceNumber: cells[0].querySelector("input").value,
          customerName: cells[1].querySelector("input").value,
          productName: cells[2].querySelector("input").value,
          brand: cells[3].querySelector("input").value,
          quantity: cells[4].querySelector("input").value,
          amount: cells[5].querySelector("input").value,
          salesDate: cells[6].querySelector("input").value
        };

        sales[index] = updatedSale;
        localStorage.setItem("sales", JSON.stringify(sales));
        loadSales();
        return;
      }

      cells.forEach(cell => {
        const text = cell.querySelector("span").textContent;
        cell.innerHTML = `<input class="editable" type="text" value="${text}">`;
      });

      btn.innerHTML = `<i class="fas fa-save"></i> Save`;

      const cancelBtn = document.createElement("button");
      cancelBtn.className = "btn btn-cancel";
      cancelBtn.innerHTML = `<i class="fas fa-times"></i> Cancel`;
      cancelBtn.onclick = () => loadSales();

      btn.parentElement.appendChild(cancelBtn);
    }

    loadSales();
  </script>
</body>
</html>
